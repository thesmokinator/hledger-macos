name: Capture Screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test (capture screenshots)
        run: |
          xcodebuild test \
            -project hledger-macos.xcodeproj \
            -scheme hledger-macos \
            -destination 'platform=macOS' \
            -only-testing:hledger-macosUITests/hledger_macosUITests/testCaptureAllSections \
            -resultBundlePath $RUNNER_TEMP/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO || true

      - name: Extract screenshots
        run: |
          mkdir -p screenshots
          xcresulttool get test-results attachments \
            --path $RUNNER_TEMP/TestResults.xcresult \
            --output-path screenshots 2>/dev/null || true

          # Fallback: extract from xcresult bundle directly
          if [ -z "$(ls -A screenshots 2>/dev/null)" ]; then
            find $RUNNER_TEMP/TestResults.xcresult -name "*.png" -exec cp {} screenshots/ \;
          fi

          ls -la screenshots/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 30
